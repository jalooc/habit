<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Note for next time — hi-fi</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #ece8e1; }
  * { box-sizing: border-box; }

  .stage {
    min-height: 100%;
    display: flex; flex-direction: column; align-items: center;
    padding: 34px 20px 60px;
  }
  .stage .head { text-align: center; max-width: 620px; margin-bottom: 18px; }
  .stage .head .k {
    font: 500 11px/1 'Inter', sans-serif; letter-spacing: 1.8px; text-transform: uppercase;
    color: #9a948a; margin-bottom: 8px;
  }
  .stage .head h1 {
    font: 400 27px/1.15 'Fraunces', Georgia, serif; color: #1a1814; margin: 0; letter-spacing: -0.4px;
  }
  .stage .head p {
    font: 400 13.5px/1.55 'Inter', sans-serif; color: #6f6a61; margin: 10px 0 0;
  }

  .seg {
    display: inline-flex; gap: 4px; padding: 4px; border-radius: 100px;
    background: #fff; box-shadow: 0 1px 2px rgba(26,24,20,0.05), 0 6px 22px rgba(26,24,20,0.07);
    margin-bottom: 10px;
  }
  .seg button {
    border: none; cursor: pointer; background: transparent; color: #7a766e;
    padding: 9px 18px; border-radius: 100px; font: 500 12px/1 'Inter', sans-serif;
    letter-spacing: 0.4px; transition: background .2s, color .2s;
  }
  .seg button.on { background: #1a1814; color: #fff; }

  .caption {
    font: 400 11.5px/1.55 'Inter', sans-serif; color: #9a948a; margin: 14px auto 0;
    text-align: center; letter-spacing: 0.2px; max-width: 540px;
  }
  .caption b { color: #6f6a61; font-weight: 500; }
  .caption code {
    font: 500 10.5px/1 'SF Mono', ui-monospace, Menlo, monospace;
    color: #c96442; background: rgba(201,100,66,0.08);
    padding: 2px 6px; border-radius: 4px;
  }

  /* lifecycle strip beneath the device */
  .life {
    margin-top: 22px; max-width: 540px; width: 100%;
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
  }
  .life .step {
    background: #fff; border-radius: 12px; padding: 10px 12px;
    box-shadow: 0 1px 2px rgba(26,24,20,0.04);
    display: flex; flex-direction: column; gap: 4px;
  }
  .life .step.on { background: #f4dccf; box-shadow: 0 1px 2px rgba(201,100,66,0.08), 0 6px 22px rgba(201,100,66,0.12); }
  .life .step .n {
    font: 500 9px/1 'Inter', sans-serif; letter-spacing: 1.4px; text-transform: uppercase;
    color: #b5b0a6;
  }
  .life .step.on .n { color: #c96442; }
  .life .step .l { font: 500 12px/1.3 'Inter', sans-serif; color: #3c3a35; }
  .life .step.on .l { color: #1a1814; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="shared-data.js"></script>
<script type="text/babel" src="tokens.jsx"></script>
<script type="text/babel" src="rings.jsx"></script>
<script type="text/babel" src="swipeable.jsx"></script>
<script type="text/babel" src="android-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="edit-time.jsx"></script>
<script type="text/babel" src="whisper.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useMemo } = React;

// ─────────────────────────────────────────────────────────────────────
// Demo data — a Core rotation. Hollow hold is up next; it has a whisper
// waiting from last time. Bird dog (3rd) also has a whisper. The other
// rows are plain.
// ─────────────────────────────────────────────────────────────────────

const DEMO_GROUP = {
  id: 'core',
  name: 'Core',
  cadence: { kind: 'daily', label: 'Once a day' },
  cursor: 2,
  paused: false,
  habits: [
    { id: 'h1', name: 'Front plank, 60s', images: [] },
    { id: 'h2', name: 'Dead bug, 12 reps', images: [] },
    { id: 'h3', name: 'Hollow hold, 45s', images: [],
      note: 'Ribs down, lower back pressed to the floor. 30s on, 30s off.',
      whisper: 'Do 11 next time — last set was easy on the second half.' },
    { id: 'h4', name: 'Bird dog, 10/side', images: [],
      whisper: 'Slow the eccentric — felt the lower back last time.' },
    { id: 'h5', name: 'Glute bridge, 15 reps', images: [] },
  ],
};

// upNext comes from shared-data.js (window.upNext).

// ─────────────────────────────────────────────────────────────────────
// MiniHero — focused recreation of the group hero. Keeps the visual
// language (OrbitRing, italic Fraunces name, slide-to-confirm) but
// drops the kitchen-sink (lightbox, undo, swipe-reorder) so the
// whisper components carry the screen.
// ─────────────────────────────────────────────────────────────────────

function MiniHero({ group, mode, composerState, composerValue, setComposerState, setComposerValue, glyph, openSheet }) {
  const { t, d } = useTokens();
  const habit = upNext(group);

  return (
    <div style={{ background: t.bg, color: t.ink, minHeight: '100%',
                  display: 'flex', flexDirection: 'column' }}>

      {/* Top bar */}
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '14px 18px 6px',
      }}>
        <button style={{
          border: 'none', background: 'transparent', cursor: 'pointer',
          color: t.inkSoft, font: `500 11px/1 'Inter'`, letterSpacing: 1.4,
          textTransform: 'uppercase', display: 'inline-flex', alignItems: 'center', gap: 5,
        }}>
          <span style={{ fontSize: 14 }}>‹</span> Back
        </button>
        <div style={{
          font: `500 10px/1 'Inter'`, letterSpacing: 1.8,
          color: t.inkFaint, textTransform: 'uppercase',
        }}>{group.name}</div>
        <button onClick={openSheet} style={{
          border: 'none', background: 'transparent', cursor: 'pointer',
          color: t.accent, font: `500 11px/1 'Inter'`, letterSpacing: 1.4,
          textTransform: 'uppercase', display: 'inline-flex', alignItems: 'center', gap: 5,
        }}>Edit <span style={{ font: `400 13px/1 'Fraunces'` }}>✎</span></button>
      </div>

      {/* Hero ring — OrbitRing renders its own UP NEXT + name in the center */}
      <div style={{ padding: '14px 18px 0', display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
        <OrbitRing group={group} size={228} />
      </div>

      {/* Whisper slot — different content per mode */}
      <div style={{ padding: '20px 18px 0', display: 'flex', flexDirection: 'column', gap: 14 }}>
        {mode === 'display' && (
          <WhisperHeroCard note={habit.whisper} glyph={glyph} />
        )}
        {mode === 'compose' && (
          <WhisperComposer
            value={composerValue}
            onChange={setComposerValue}
            expanded={composerState === 'expanded' || composerState === 'filled'}
            onExpand={() => setComposerState('expanded')}
            onCollapse={() => { setComposerState('collapsed'); setComposerValue(''); }}
            glyph={glyph}
          />
        )}
      </div>

      {/* CTA */}
      <div style={{ padding: '18px 18px 8px' }}>
        <SlideToConfirm
          label="Slide to log"
          doneLabel="Logged"
          onConfirm={() => {}} />
        <div style={{
          marginTop: 10, textAlign: 'center',
          font: `500 10px/1 'Inter'`, letterSpacing: 1.4,
          color: t.inkFaint, textTransform: 'uppercase', whiteSpace: 'nowrap',
        }}>
          {mode === 'compose' && composerState === 'filled'
            ? 'whisper rides along'
            : 'edit time'}
        </div>
      </div>

      {/* Queue */}
      <div style={{ padding: '20px 18px 0' }}>
        <div style={{
          display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 12,
        }}>
          <div style={{
            font: `500 11px/1 'Inter'`, letterSpacing: 1.8,
            color: t.inkSoft, textTransform: 'uppercase',
          }}>The queue</div>
          <div style={{ font: `400 11px 'Inter'`, color: t.inkFaint }}>
            Swipe a row to log
          </div>
        </div>
        <div style={{ background: t.card, borderRadius: 18, overflow: 'hidden' }}>
          {group.habits.map((h, i) => {
            const active = i === group.cursor;
            const order = i === group.cursor ? 0 : (i - group.cursor + group.habits.length) % group.habits.length;
            return (
              <div key={h.id} style={{
                padding: '14px 16px',
                borderTop: i > 0 ? `1px solid ${t.rule}` : 'none',
                display: 'flex', alignItems: 'center', gap: 14,
                background: active ? 'transparent' : 'transparent',
              }}>
                {active ? (
                  <div style={{
                    width: 24, height: 24, borderRadius: '50%',
                    background: t.accent, color: t.card,
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    font: `500 12px/1 'Inter'`, flexShrink: 0,
                  }}>✓</div>
                ) : (
                  <div style={{
                    width: 24, height: 24, display: 'flex', alignItems: 'center', justifyContent: 'center',
                    flexShrink: 0,
                  }}>
                    <div style={{
                      width: 7, height: 7, borderRadius: '50%',
                      border: `1.5px solid ${t.accentDim}`,
                    }} />
                  </div>
                )}
                <div style={{
                  flex: 1, minWidth: 0,
                  font: `400 15.5px/1.3 'Fraunces'`,
                  color: active ? t.ink : t.inkSoft,
                }}>{h.name}</div>
                {h.whisper && <WhisperRowMark glyph={glyph} />}
                {active ? (
                  <div style={{
                    font: `500 10px/1 'Inter'`, color: t.accent,
                    letterSpacing: 1, textTransform: 'uppercase',
                  }}>NOW</div>
                ) : (
                  <div style={{
                    font: `500 9px/1 'Inter'`, color: t.inkFaint,
                    letterSpacing: 1.4, textTransform: 'uppercase', opacity: 0.55,
                  }}>{String(order).padStart(2, '0')}</div>
                )}
              </div>
            );
          })}
        </div>
        <div style={{
          marginTop: 12, font: `400 12px/1.45 'Fraunces'`, fontStyle: 'italic',
          color: t.inkFaint, padding: '0 4px',
        }}>
          {group.habits.filter((h) => h.whisper).length} {group.habits.filter((h) => h.whisper).length === 1 ? 'whisper' : 'whispers'} waiting · open a habit to read or edit
        </div>
      </div>

      <div style={{ flex: 1 }} />
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────
// HabitSheet — the habit's form sheet (Reader/Edit unified for this demo).
// Shows the new "Note for next time" field at the bottom, populated.
// ─────────────────────────────────────────────────────────────────────

function HabitSheet({ habit, onClose, glyph }) {
  const { t } = useTokens();
  const [name, setName] = useState(habit.name);
  const [note, setNote] = useState(habit.note || '');
  const [whisper, setWhisper] = useState(habit.whisper || '');

  return (
    <>
      <SheetBackdrop onDismiss={onClose} />
      <BottomSheet height={680}>
        <div style={{
          padding: '0 18px 4px',
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          flexShrink: 0,
        }}>
          <button onClick={onClose} style={{
            border: 'none', background: 'transparent', cursor: 'pointer',
            font: `500 11px/1 'Inter'`, letterSpacing: 1, textTransform: 'uppercase',
            color: t.inkSoft, padding: '8px 6px',
          }}>Cancel</button>
          <span style={{
            font: `500 10px/1 'Inter'`, letterSpacing: 1.8,
            color: t.inkFaint, textTransform: 'uppercase', whiteSpace: 'nowrap',
          }}>Edit habit</span>
          <button onClick={onClose} style={{
            border: 'none', background: 'transparent', cursor: 'pointer',
            font: `500 11px/1 'Inter'`, letterSpacing: 1, textTransform: 'uppercase',
            color: t.accent, padding: '8px 6px',
          }}>Save</button>
        </div>

        <div style={{
          flex: 1, overflowY: 'auto',
          padding: '10px 22px 22px',
          display: 'flex', flexDirection: 'column', gap: 18,
        }}>
          {/* Name */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            <div style={{
              font: `500 10px/1 'Inter'`, letterSpacing: 1.8,
              color: t.inkSoft, textTransform: 'uppercase',
            }}>Name</div>
            <input
              value={name}
              onChange={(e) => setName(e.target.value)}
              style={{
                width: '100%', boxSizing: 'border-box',
                background: t.bg, border: `1px solid ${t.rule}`, borderRadius: 12,
                padding: '12px 14px',
                font: `400 16px/1.3 'Fraunces'`, color: t.ink, outline: 'none',
              }}
            />
          </div>

          {/* Note (persistent) */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            <div style={{
              font: `500 10px/1 'Inter'`, letterSpacing: 1.8,
              color: t.inkSoft, textTransform: 'uppercase',
              display: 'flex', alignItems: 'baseline', gap: 8,
            }}>
              <span>Note</span>
              <span style={{ font: `400 9px/1 'Inter'`, color: t.inkFaint }}>· about the practice · persistent</span>
            </div>
            <textarea
              value={note}
              onChange={(e) => setNote(e.target.value)}
              rows={3}
              placeholder="Form cues, why it matters, a link you keep returning to."
              style={{
                width: '100%', boxSizing: 'border-box', resize: 'none',
                background: t.bg, border: `1px solid ${t.rule}`, borderRadius: 12,
                padding: '12px 14px',
                font: `400 14px/1.55 'Fraunces'`, color: t.ink, outline: 'none',
              }}
            />
          </div>

          {/* Whisper field — NEW */}
          <WhisperFormField
            value={whisper}
            onChange={setWhisper}
            onDiscard={() => setWhisper('')}
            glyph={glyph}
          />

          {/* Delete affordance */}
          <div style={{ display: 'flex', justifyContent: 'center', marginTop: 4 }}>
            <button style={{
              border: 'none', background: 'transparent',
              color: t.accent, cursor: 'pointer', padding: '6px 10px',
              font: `500 11px/1 'Inter'`, letterSpacing: 1.4, textTransform: 'uppercase',
            }}>Delete habit ›</button>
          </div>
        </div>
      </BottomSheet>
    </>
  );
}

// ─────────────────────────────────────────────────────────────────────
// App
// ─────────────────────────────────────────────────────────────────────

const STATE_HINTS = {
  display: 'On the up-next hero — a coral italic card directly above the slide-to-log CTA. The line is automatic on arrival; the user reads it and slides to confirm. The whisper clears on tick, and the queue below shows which other habits have one waiting.',
  compose: 'Hero at tick time, with the composer expanded. The collapsed default is a dashed coral pill — quiet, optional, never blocks the slide. When you slide to confirm, the whisper rides along and attaches to the next instance of this habit.',
  sheet:   'On the habit sheet (formSheet). Sits below Name and Note as another field — same edit/discard chrome as everything else. This is the only surface where the whisper text can be read or edited outside its scheduled appearance on the hero.',
};

const LIFE_STEPS = {
  display: 1,
  compose: 0,
  sheet:   3,
};

function App() {
  const [tw, setTw] = useTweaks({
    dark: false,
    glyph: 'quill',
    whisperPrefilled: 'do 11 next time',
    composerStep: 'collapsed',
    showTweaks: true,
  });

  const [tab, setTab] = useState('display');
  const [composerState, setComposerState] = useState('collapsed');
  const [composerValue, setComposerValue] = useState('');
  const [sheetOpen, setSheetOpen] = useState(false);

  // Sync composer state with the tweak when in Insertion tab
  React.useEffect(() => {
    if (tab !== 'compose') return;
    if (tw.composerStep === 'collapsed') {
      setComposerState('collapsed');
      setComposerValue('');
    } else if (tw.composerStep === 'expanded') {
      setComposerState('expanded');
      setComposerValue('');
    } else if (tw.composerStep === 'filled') {
      setComposerState('filled');
      setComposerValue(tw.whisperPrefilled || 'Do 11 next time');
    }
  }, [tab, tw.composerStep, tw.whisperPrefilled]);

  // Open sheet by default on Habit-sheet tab
  React.useEffect(() => {
    setSheetOpen(tab === 'sheet');
  }, [tab]);

  return (
    <TokenProvider tweaks={{ dark: tw.dark, density: 'cozy', tone: 'literary', ringSize: 'default' }}>
      <div className="stage">

        <div className="head">
          <div className="k">Note for next time · hi-fi</div>
          <h1>A whisper from past you, for next time.</h1>
          <p>A one-line note written at tick time, read once on the next pickup, then cleared.
             Lives on the habit alongside the persistent description, but consumed on tick — a self-addressed
             sticky note that travels with the next instance.</p>
        </div>

        <div className="seg">
          <button className={tab === 'display' ? 'on' : ''} onClick={() => setTab('display')}>Display · receive</button>
          <button className={tab === 'compose' ? 'on' : ''} onClick={() => setTab('compose')}>Insertion · write</button>
          <button className={tab === 'sheet'   ? 'on' : ''} onClick={() => setTab('sheet')}>Habit sheet · manage</button>
        </div>

        <AndroidDevice width={412} height={892} dark={tw.dark}>
          <div style={{ width: '100%', height: '100%', position: 'relative', overflow: 'hidden',
                        background: tw.dark ? '#1c1d20' : '#f5f1ec' }}>
            <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
              <div style={{ flex: 1, overflow: 'auto' }}>
                <MiniHero
                  group={DEMO_GROUP}
                  mode={tab === 'sheet' ? 'display' : tab}
                  composerState={composerState}
                  setComposerState={setComposerState}
                  composerValue={composerValue}
                  setComposerValue={setComposerValue}
                  glyph={tw.glyph}
                  openSheet={() => setSheetOpen(true)}
                />
              </div>
            </div>

            {sheetOpen && (
              <HabitSheet
                habit={upNext(DEMO_GROUP)}
                onClose={() => { setSheetOpen(false); if (tab === 'sheet') setTab('display'); }}
                glyph={tw.glyph}
              />
            )}
          </div>
        </AndroidDevice>

        <div className="caption">
          {STATE_HINTS[tab]}
          <div style={{ marginTop: 10 }}>
            Habit sheet presentation: <code>formSheet · medium detent</code> · whisper field clears on tick · undo restores within the existing 5.5s window
          </div>
        </div>

        {/* lifecycle strip — small, illustrative */}
        <div className="life">
          {['Tick + write', 'Wait until next pickup', 'Read on hero', 'Manage via habit sheet'].map((label, i) => (
            <div key={i} className={`step ${LIFE_STEPS[tab] === i ? 'on' : ''}`}>
              <div className="n">step {i + 1}</div>
              <div className="l">{label}</div>
            </div>
          ))}
        </div>
      </div>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Theme" />
        <TweakToggle label="Dark mode" value={tw.dark} onChange={(v) => setTw('dark', v)} />

        <TweakSection label="Indicator glyph" />
        <TweakRadio label="Mark"
          value={tw.glyph}
          options={['quill', 'quote', 'dot', 'chip']}
          onChange={(v) => setTw('glyph', v)} />

        <TweakSection label="Composer state" />
        <TweakRadio label="Step (Insertion tab)"
          value={tw.composerStep}
          options={['collapsed', 'expanded', 'filled']}
          onChange={(v) => setTw('composerStep', v)} />
        <TweakText label="Filled text"
          value={tw.whisperPrefilled}
          onChange={(v) => setTw('whisperPrefilled', v)} />
      </TweaksPanel>
    </TokenProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
